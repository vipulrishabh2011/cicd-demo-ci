name: CI Build Push Update CD Repo

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: cicd-demo-app
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  CD_REPO: vipulrishabh2011/cicd-demo-cd

jobs:
  build-push-update-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker image
        run: docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG

      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.CD_REPO }}
          token: ${{ secrets.CD_REPO_TOKEN }}
          path: cd-repo

      - name: Update image tag in CD repo
        run: |
          cd cd-repo
          sed -i "s|image: .*cicd-demo-app:.*|image: $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image tag to $IMAGE_TAG" || echo "No changes to commit"
          git push
